query GetUser($id: ID!) {
  user(id: $id) {
    id
    name
    email
    age
    active
    createdAt
    address {
      street
      city
      country
      zip
    }
  }
}

query ListUsers($active: Boolean, $limit: Int) {
  users(active: $active, limit: $limit) {
    id
    name
    email
    active
  }
}

query GetPost($id: ID!) {
  post(id: $id) {
    id
    title
    body
    published
    createdAt
    tags
    author {
      id
      name
      email
    }
  }
}

mutation CreateUser($input: CreateUserInput!) {
  createUser(input: $input) {
    id
    name
    email
    active
  }
}

mutation UpdateUser($id: ID!, $name: String, $age: Int) {
  updateUser(id: $id, name: $name, age: $age) {
    id
    name
    age
  }
}

mutation DeleteUser($id: ID!) {
  deleteUser(id: $id)
}

mutation UploadAvatar($userId: ID!, $file: Upload!) {
  uploadAvatar(userId: $userId, file: $file) {
    id
    name
  }
}

subscription OnUserUpdated($id: ID!) {
  userUpdated(id: $id) {
    id
    name
    email
  }
}

subscription OnPostPublished($authorId: ID!) {
  postPublished(authorId: $authorId) {
    id
    title
    published
    author {
      id
      name
    }
  }
}
